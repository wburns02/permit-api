name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Lint ──────────────────────────────────────────────────────────────────
  # Scoped to critical rules only (E9, F63, F7, F82) so CI is green today.
  # These catch syntax errors, undefined names, and invalid escape sequences
  # without failing on style issues in the existing codebase.
  # Tighten the select list (e.g. add "E", "W") as the codebase is cleaned up.
  lint:
    name: Lint (ruff - critical rules)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff>=0.4.0

      - name: Run ruff (syntax + undefined names only)
        run: |
          ruff check \
            --select E9,F63,F7,F82 \
            --output-format github \
            .

  # ── Tests ─────────────────────────────────────────────────────────────────
  test:
    name: Test (pytest + PostgreSQL 16)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: permit_api
          POSTGRES_PASSWORD: permit_api
          POSTGRES_DB: permit_api_test
        ports:
          - 5432:5432
        # Wait until pg is accepting connections before the job steps run.
        options: >-
          --health-cmd "pg_isready -U permit_api"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://permit_api:permit_api@localhost:5432/permit_api_test
      # Supply dummy values for required settings so app/config.py loads cleanly
      # without touching any real credentials.
      SECRET_KEY: ci-secret-key-not-for-production
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder
      STRIPE_PRICE_EXPLORER: price_placeholder
      STRIPE_PRICE_PRO_LEADS: price_placeholder
      STRIPE_PRICE_REAL_TIME: price_placeholder
      REDIS_URL: redis://localhost:6379  # not started; app has in-memory fallback
      ENVIRONMENT: test
      DEBUG: "false"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run alembic migrations
        # alembic/versions/ is currently empty so this is a no-op, but it
        # verifies that alembic can connect and that env.py loads correctly.
        # Once migration files are added they will run automatically here.
        run: alembic upgrade head
        continue-on-error: true  # remove once first migration file is added

      - name: Run tests
        # Excluded tests and reasons:
        #   tests/test_full_e2e.py        - hits https://permits.ecbtx.com with a hardcoded
        #                                   live API key; production-only, not for CI.
        #   tests/test_analyst_features.py - hits https://permit-api-production-6eae.up.railway.app;
        #                                   production-only, not for CI.
        #   tests/test_w1_alerts.py        - directly connects to T430 Postgres at Tailscale IP
        #                                   100.122.216.15, unreachable from GitHub Actions.
        #                                   See postgres-punchlist in ci.yml header comments to
        #                                   fix this and run it against the CI service container.
        #   tests/test_burns_events_emit.py - Burns L4 emitter; needs burns_events DSN on r730-2
        #                                   infra + psycopg2. L4 is feature-flagged OFF and out of
        #                                   scope (docs/pipeline/PLAN.md deferred items).
        run: |
          pytest \
            --tb=short \
            -q \
            --asyncio-mode=auto \
            --ignore=tests/test_full_e2e.py \
            --ignore=tests/test_analyst_features.py \
            --ignore=tests/test_w1_alerts.py \
            --ignore=tests/test_burns_events_emit.py \
            tests/

  # ── Route Auth Sweep ───────────────────────────────────────────────────────
  # Phase 1 Security close-out: every non-allowlisted route must return
  # 401/403/405 when called without an X-API-Key. Fails the build on any
  # unauthenticated 200 outside the documented allowlist.
  # Uses httpx.ASGITransport (no live DB needed) so it runs hermetically.
  auth-sweep:
    name: Route Auth Sweep
    runs-on: ubuntu-latest

    env:
      SECRET_KEY: ci-secret-key-not-for-production
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder
      STRIPE_PRICE_EXPLORER: price_placeholder
      STRIPE_PRICE_PRO_LEADS: price_placeholder
      STRIPE_PRICE_REAL_TIME: price_placeholder
      DATABASE_URL: postgresql+asyncpg://permit_api:permit_api@localhost:5432/permit_api_test
      REDIS_URL: ""
      ENVIRONMENT: test
      DEBUG: "false"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run route auth sweep
        # test_security_sweep.py uses httpx.ASGITransport (no live DB needed).
        # Auth-gated routes return 401 before DB access when no X-API-Key supplied.
        run: |
          pytest \
            --tb=short \
            -q \
            --asyncio-mode=auto \
            -v \
            tests/test_security_sweep.py

  # ── Secrets Audit (gitleaks) ───────────────────────────────────────────────
  # Scans the full git history for leaked credentials. Clean = zero findings.
  # Any finding here means a credential was committed — rotate immediately.
  secrets-audit:
    name: Secrets Audit (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for gitleaks --log-opts=--all

      - name: Install gitleaks
        run: |
          curl -sSfL \
            https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz \
            -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Scan full git history
        # .gitleaks.toml contains per-commit allowlist entries for reviewed findings.
        # Any NEW finding not in .gitleaks.toml will fail this step.
        run: |
          gitleaks detect \
            --source . \
            --log-opts="--all" \
            --config .gitleaks.toml \
            --report-format json \
            --report-path gitleaks-report.json \
            --exit-code 1

      - name: Upload gitleaks report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          if-no-files-found: ignore
