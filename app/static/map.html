<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PermitLookup Map: Permits, Wells, Drilling Activity</title>
<link rel="icon" type="image/png" href="/static/icon-192.png">
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet"
      integrity="sha384-MinO0mNliZ3vwppuPOUnGa+iq619pfMhLVUXfC4LHwSCvF9H+6P/KO4Q7qBOYV5V" crossorigin="anonymous">
<style>
  :root { --bg:#0f172a; --panel:#1e293b; --text:#e2e8f0; --muted:#94a3b8; --accent:#38bdf8; }
  * { box-sizing:border-box; margin:0; }
  body { font-family:system-ui,-apple-system,sans-serif; height:100vh; overflow:hidden; }
  #map { position:absolute; inset:0; }
  header {
    position:absolute; top:0; left:0; right:0; z-index:10;
    background:rgba(15,23,42,.92); color:var(--text);
    display:flex; align-items:center; gap:14px; padding:10px 16px; flex-wrap:wrap;
  }
  header h1 { font-size:16px; font-weight:600; }
  header h1 a { color:var(--accent); text-decoration:none; }
  #stats { color:var(--muted); font-size:12.5px; }
  #controls {
    position:absolute; top:64px; left:12px; z-index:10;
    background:rgba(15,23,42,.92); color:var(--text); border-radius:10px;
    padding:12px; width:230px; font-size:13px;
  }
  #controls h2 { font-size:12px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); margin:8px 0 6px; }
  #controls h2:first-child { margin-top:0; }
  .row { display:flex; align-items:center; gap:8px; padding:4px 0; cursor:pointer; }
  .dot { width:11px; height:11px; border-radius:50%; flex:none; }
  .chips { display:flex; gap:6px; flex-wrap:wrap; }
  .chip {
    padding:4px 10px; border-radius:999px; border:1px solid #334155;
    background:transparent; color:var(--text); font-size:12px; cursor:pointer;
  }
  .chip.active { background:var(--accent); color:#082f49; border-color:var(--accent); }
  .maplibregl-popup-content { font:12.5px/1.45 system-ui; color:#0f172a; max-width:260px; }
  .maplibregl-popup-content b { font-size:13px; }
  #attrib { position:absolute; bottom:2px; left:4px; z-index:5; font:10px system-ui; color:#64748b; }
  @media (max-width:640px) {
    #controls { top:auto; bottom:12px; left:12px; right:12px; width:auto; }
    header h1 { font-size:14px; }
    #stats { display:none; }
  }
</style>
</head>
<body>
<div id="map"></div>
<header>
  <h1><a href="/">PermitLookup</a> Map</h1>
  <span id="stats">loading activity...</span>
</header>
<div id="controls">
  <h2>Layers</h2>
  <label class="row"><input type="checkbox" id="ck-well-permits" checked>
    <span class="dot" style="background:#ef4444"></span> Drilling permits (W-1)</label>
  <label class="row"><input type="checkbox" id="ck-wells">
    <span class="dot" style="background:#22c55e"></span> Oil and gas wells</label>
  <label class="row"><input type="checkbox" id="ck-permits">
    <span class="dot" style="background:#f59e0b"></span> Building permits</label>
  <h2>Time window</h2>
  <div class="chips" id="time-chips">
    <button class="chip" data-days="30">30d</button>
    <button class="chip active" data-days="365">1y</button>
    <button class="chip" data-days="0">All</button>
  </div>
</div>
<div id="attrib">Data: Texas RRC, municipal permit records. permits.ecbtx.com</div>
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"
        integrity="sha384-SYKAG6cglRMN0RVvhNeBY0r3FYKNOJtznwA0v7B5Vp9tr31xAHsZC0DqkQ/pZDmj" crossorigin="anonymous"></script>
<script>
const LAYERS = {
  "well-permits": {
    color: ["match", ["get","profile"],
            "horizontal","#ef4444", "directional","#f97316",
            "sidetrack","#eab308", "#3b82f6"],
    minzoom: 4,
    popup: p => `<b>W-1 Permit ${p.permit_number}</b><br>
      ${p.operator || ""}<br>${p.county || ""} County, ${p.profile || "unknown"} ${p.purpose || ""}<br>
      ${p.status || ""}${p.approved ? " " + p.approved : ""}${p.depth ? "<br>TD " + Math.round(p.depth).toLocaleString() + " ft" : ""}`
  },
  "wells": {
    color: ["match", ["get","status"],
            "PRODUCING","#22c55e", "SHUT IN","#94a3b8",
            "INJECTION","#a855f7", "TEMP ABANDONED","#64748b", "#0ea5e9"],
    minzoom: 6,
    popup: p => `<b>Well ${p.api10}</b><br>${p.well_name || ""}<br>
      ${p.operator || ""}<br>${p.county || ""} County, ${p.well_type || ""} ${p.status || ""}
      ${p.completed ? "<br>Completed " + p.completed : ""}`
  },
  "permits": {
    color: "#f59e0b",
    minzoom: 8,
    popup: p => `<b>Permit ${p.permit_number || ""}</b><br>
      ${p.permit_type || ""}<br>${p.address || ""}<br>
      ${p.status || ""}${p.issued ? " " + p.issued : ""}
      ${p.value ? "<br>$" + Math.round(p.value).toLocaleString() : ""}`
  },
};
let days = 365;

const map = new maplibregl.Map({
  container: "map",
  style: "https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json",
  center: [-99.0, 31.3],
  zoom: 5.4,
  attributionControl: true,
});
window._map = map;  // exposed for automated testing
map.addControl(new maplibregl.NavigationControl(), "top-right");
map.addControl(new maplibregl.GeolocateControl({trackUserLocation: true}), "top-right");

function tileUrl(layer) {
  // wells are a present-state inventory, not a recency feed: a 1985
  // completion still exists and produces, so the time window skips them
  const d = layer === "wells" ? 0 : days;
  return `${location.origin}/v1/map/tiles/${layer}/{z}/{x}/{y}.pbf?days=${d}`;
}

function addLayer(name) {
  map.addSource(name, {type: "vector", tiles: [tileUrl(name)], minzoom: LAYERS[name].minzoom, maxzoom: 14});
  map.addLayer({
    id: name, type: "circle", source: name, "source-layer": name,
    paint: {
      "circle-color": LAYERS[name].color,
      "circle-radius": ["interpolate", ["linear"], ["zoom"], 5, 2.2, 9, 4, 13, 7],
      "circle-opacity": 0.85,
      "circle-stroke-width": 0.5,
      "circle-stroke-color": "#0f172a",
    },
    layout: {visibility: name === "well-permits" ? "visible" : "none"},
  });
  map.on("click", name, e => {
    const p = e.features[0].properties;
    new maplibregl.Popup().setLngLat(e.lngLat).setHTML(LAYERS[name].popup(p)).addTo(map);
  });
  map.on("mouseenter", name, () => map.getCanvas().style.cursor = "pointer");
  map.on("mouseleave", name, () => map.getCanvas().style.cursor = "");
}

map.on("load", () => {
  Object.keys(LAYERS).forEach(addLayer);
});

Object.keys(LAYERS).forEach(name => {
  document.getElementById("ck-" + name).addEventListener("change", e => {
    map.setLayoutProperty(name, "visibility", e.target.checked ? "visible" : "none");
  });
});

document.getElementById("time-chips").addEventListener("click", e => {
  if (!e.target.dataset.days) return;
  days = parseInt(e.target.dataset.days, 10);
  document.querySelectorAll("#time-chips .chip").forEach(c => c.classList.toggle("active", c === e.target));
  Object.keys(LAYERS).forEach(name => {
    map.getSource(name).setTiles([tileUrl(name)]);
  });
});

fetch("/v1/well-permits/stats").then(r => r.json()).then(s => {
  document.getElementById("stats").textContent =
    `${(s.total_records || 0).toLocaleString()} drilling permits tracked, ` +
    `${s.approved_last_30_days || 0} approved in the last 30 days, latest ${s.latest_approved_date || ""}`;
}).catch(() => {});
</script>
</body>
</html>
