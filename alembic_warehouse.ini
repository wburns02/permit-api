# Alembic environment for the PERMITS WAREHOUSE (T430/r730-2 "permits" DB),
# distinct from the app DB managed by alembic.ini. Run with:
#   alembic -c alembic_warehouse.ini upgrade head
# DSN override: WAREHOUSE_DATABASE_URL (sync driver, psycopg2).
[alembic]
script_location = alembic_warehouse
sqlalchemy.url = postgresql://will@100.122.216.15:5432/permits

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
